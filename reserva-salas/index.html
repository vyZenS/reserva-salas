<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="Sistema de reserva de salas para la Universidad de Talca.">
    <title>Sistema de Reservas de Salas - Login</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <form action="#" method="post">
                <h2><i class="fa-solid fa-right-to-bracket"></i> Iniciar Sesión</h2>

                <div class="input-group">
                    <label for="email">Correo Institucional</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="ejemplo@utalca.cl"
                        required
                    />
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Escribe tu contraseña"
                        required
                    />
                </div>

                <p class="error-message"></p>
                <button type="submit" id="login-btn">Entrar</button>

                <div class="register-link">
                    <a href="register.html">¿No tienes una cuenta? Regístrate</a>
                </div>
            </form>
        </div>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
