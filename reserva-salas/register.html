<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Usuario</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <form action="index.html" method="post">
                <h2><i class="fa-solid fa-user-plus"></i> Registrarse</h2>
                <div class="input-group">
                    <label for="reg-rut">RUT (sin puntos ni guión)</label>
                    <input
                        type="number"
                        id="reg-rut"
                        name="rut"
                        placeholder="Ej: 12345678"
                        required
                    />
                </div>
                <div class="input-group">
                    <label for="reg-nombre">Nombre y Apellidos</label>
                    <input
                        type="text"
                        id="reg-nombre"
                        name="nombre"
                        placeholder="Ej: Juan Pérez"
                        required
                    />
                </div>
                <div class="input-group">
                    <label for="reg-rol">Rol</label>
                    <select
                        id="reg-rol"
                        name="rol"
                        required
                        style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc; background-color: #fff; color: #000;"
                    >
                        <option value="">Seleccione un rol...</option>
                        <option value="estudiante">Estudiante</option>
                        <option value="profesor">Profesor</option>
                        <option value="personal">Personal Administrativo</option>
                        <option value="admin">Administrador (Prueba)</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="reg-email">Correo Institucional</label>
                    <input
                        type="email"
                        id="reg-email"
                        name="email"
                        placeholder="ejemplo@utalca.cl"
                        required
                    />
                </div>
                <div class="input-group">
                    <label for="reg-pass">Contraseña</label>
                    <input
                        type="password"
                        id="reg-pass"
                        name="password"
                        placeholder="Crea tu contraseña"
                        required
                    />
                </div>
                <div class="input-group">
                    <label for="reg-confirm">Confirmar Contraseña</label>
                    <input
                        type="password"
                        id="reg-confirm"
                        name="confirmPassword"
                        placeholder="Repite tu contraseña"
                        required
                    />
                </div>
                <p class="error-message"></p>
                <button type="submit" id="register-btn">Registrarse</button>
                <div class="register-link">
                    <a href="index.html">¿Ya tienes una cuenta? Inicia sesión</a>
                </div>
            </form>
        </div>
    </div>
    <script src="js/register.js"></script>
</body>
</html>
